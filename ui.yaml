type: vertical-stack
cards:
  - type: entities
    title: Car
    show_header_toggle: false
    entities:
      - entity: sensor.wvwzzze1zpp038200_odometer
        name: Odometer
      - entity: sensor.wvwzzze1zpp038200_battery_cruising_range
        name: Range
      - entity: sensor.wvwzzze1zpp038200_battery_level
        name: Battery
      - entity: number.wvwzzze1zpp038200_battery_target_charge_level
        name: Target
      - entity: sensor.wvwzzze1zpp038200_charging_rate
        name: Charging rate
      - entity: sensor.wvwzzze1zpp038200_charging_time_left
        name: Remaining charge time
      - entity: sensor.wvwzzze1zpp038200_charging_power
        name: Charging Power
    visibility:
      - condition: user
        users:
          - 63a3125913914e7dac4cb7dea10b35b4
  - type: vertical-stack
    cards:
      - type: entities
        title: Easee Charging Station
        entities:
          - entity: sensor.easee_charger_power
            name: Car Charging Power
          - entity: sensor.easee_charger_session_energy
            name: Energy Session
          - entity: sensor.easee_charger_status
            name: Charger Status
          - entity: sensor.easee_charging_mode_readonly
            name: Mode
          - entity: sensor.easee_dynamic_current_readonly
            name: Dynamic Current
      - type: horizontal-stack
        cards:
          - show_name: true
            show_icon: true
            type: button
            name: Default
            icon: mdi:clock-outline
            tap_action:
              action: call-service
              service: script.easee_mode_default
          - type: button
            name: Boost
            icon: mdi:flash
            tap_action:
              action: call-service
              service: script.easee_mode_boost
          - type: button
            name: Solar only
            icon: mdi:white-balance-sunny
            tap_action:
              action: call-service
              service: script.easee_mode_solar_only
      - type: history-graph
        title: Easee – power & mode
        hours_to_show: 6
        refresh_interval: 30
        entities:
          - entity: sensor.easee_charger_power
            name: Charger Power
          - entity: sensor.easee_dynamic_current_readonly
            name: Dynamic Current
          - entity: sensor.easee_charging_mode_readonly
            name: Mode
